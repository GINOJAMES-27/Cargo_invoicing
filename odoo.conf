[options]
# Specifies the Linux directory paths where Odoo core and your custom module sit inside the container
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/var/lib/odoo/custom_addons

# Dynamically injected variables that will link to Neon.tech, Supabase, or Railway's database
db_host = ${DB_HOST}
db_user = ${DB_USER}
db_password = ${DB_PASSWORD}
db_port = ${DB_PORT}
db_name = ${DB_NAME}

# Critical for handling real-time audio streams (Groq) and reverse proxies cleanly
proxy_mode = True
xmlrpc_port = 8069

# Production log tracking inside the container console
log_level = info
logfile = False